name: pet_log
description: Pet Log mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.0.0

  # HTTP
  dio: ^5.7.0

  # Local storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Voice recording
  record: ^5.1.2

  # Maps & location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2

  # Charts
  fl_chart: ^0.70.2

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
